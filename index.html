<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up Page</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <div class="left">
            <div class="logo">
                <img src="https://raw.githubusercontent.com/TheOdinProject/curriculum/5f37d43908ef92499e95a9b90fc3cc291a95014c/html_css/project-sign-up-form/odin-lined.png" alt="Logo of Odin Project"><p>odin</p>
            </div>
            <p>
                Get this Image on: <a href="https://www.needpix.com/photo/1510843/black-dark-background-web-website-webpage-wallpaper-page-pages">Needpix.com</a>
            </p>
        </div>
        <div class="right">
            <div class="top">
                <p>
                    This is not a real website. You need something like thisin your life to help you think clearly... Sign up <em>now</em> to get started.
                </p>
                <p>
                    you <em>know</em> you want to.
                </p>
            </div>
            <form action="#" method="get">
                <fieldset class="input-field">
                    <legend>Let's do this!</legend>
                    <div class="split">
                        <div class="element"><label for="firstName">FIRST NAME</label><input type="text" id="firstName" required></div>
                        <div class="element"><label for="lastName">LAST NAME</label><input type="text" id="lastName" required></div>
                    </div>
                    <div class="split">
                        <div class="element"><label for="email">EMAIL</label><input type="email" id="email" required></div>
                        <div class="element"><label for="ph">PHONE NUMBER</label><input type="text" required></div>
                    </div>
                    <div class="split">
                        <div class="element"><label for="ph">PASSOWRD</label><input type="text" id="ph" required></div>
                        <div class="element"><label for="ph_confirm">CONFIRM PASSOWRD</label><input type="text" id="ph_confirm" required></div>
                    </div>
                </fieldset>
                <fieldset>
                    <button type="submit" class="button">Create Account</button>
                </fieldset>
            </form>
        </div>
    </div>
</body> 
</html>
